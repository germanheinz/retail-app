#! IMPORTANT: emptyDir is used for storage — all data is LOST when the Pod restarts.
#! IMPORTANT: Use a PersistentVolumeClaim (PVC) instead of emptyDir for any real data.
#! IMPORTANT: MySQL credentials are hardcoded — use Kubernetes Secrets in production.
# ? StatefulSet gives each Pod a stable identity and ordered deployment/scaling.
# ? Used here for MySQL because it requires a predictable hostname for the headless service DNS.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: catalog-mysql
  labels:
    app.kubernetes.io/name: catalog
    app.kubernetes.io/instance: catalog
    app.kubernetes.io/component: mysql
    app.kubernetes.io/owner: retail-store-sample
spec:
  replicas: 1
  serviceName: catalog-mysql # ? MATCH (1): must equal metadata.name of the Headless Service (05_catalog_mysql_headless_service.yaml)
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog      # ? MATCH (2): these labels must match the selector in the Headless Service
      app.kubernetes.io/instance: catalog  # ? MATCH (2): so the Service knows which Pods belong to this StatefulSet
      app.kubernetes.io/component: mysql   # ? MATCH (2): and can generate their stable DNS entries
      app.kubernetes.io/owner: retail-store-sample
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog
        app.kubernetes.io/instance: catalog
        app.kubernetes.io/component: mysql
        app.kubernetes.io/owner: retail-store-sample
    spec:
      containers:
        - name: mysql
          image: "mysql:8.0"
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: my-secret-pw
            - name: MYSQL_DATABASE
              value: catalogdb
            - name: MYSQL_USER
              value: catalog_user
            - name: MYSQL_PASSWORD
              value: german123
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      volumes:
        - name: data
          emptyDir: {}
