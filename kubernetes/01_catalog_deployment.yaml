# ? NOTE Deployment defines the desired state for Pods and ReplicaSets; supports rolling updates.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  labels:
    app.kubernetes.io/name: catalog
    app.kubernetes.io/instance: catalog
    app.kubernetes.io/component: service
    app.kubernetes.io/owner: retail-store-sample
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate
  selector: 
    matchLabels: # ? IMPORTANT: These labels must exactly match the Service selector (ClusterIP) or the Headless Service used by a StatefulSet to route traffic correctly.
      app.kubernetes.io/name: catalog
      app.kubernetes.io/instance: catalog
      app.kubernetes.io/component: service
      app.kubernetes.io/owner: retail-store-sample    
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog
        app.kubernetes.io/instance: catalog
        app.kubernetes.io/component: service
        app.kubernetes.io/owner: retail-store-sample    
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: catalog
          envFrom:
            - configMapRef:
                name: catalog  
            - secretRef:
                name: catalog-db      
          securityContext:
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          image: "public.ecr.aws/i5b4r2o0/retail-store-catalog:1.0.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080  # ? Container port exposed by Pod; Services should target this port (or the Service's targetPort).
              protocol: TCP
          startupProbe: # ? Startup probe: waits for the app to be ready before other probes start (gives MySQL time to initialize)
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe: # ? Readiness probe: when ready=true Pod receives traffic from Services
            httpGet:
              path: /health
              port: 8080
          livenessProbe: # ? Liveness probe: restarts container if unhealthy
            httpGet:
              path: /health
              port: 8080                 
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 256Mi

